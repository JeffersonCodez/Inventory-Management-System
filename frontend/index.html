<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Inventory Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand-mark"><div class="diamond"></div><span>LEDGER</span></div>
    <h1>Welcome back</h1>
    <p class="login-sub">Sign in to manage your inventory</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@company.com" value="admin@ledger.io">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" value="••••••••">
    </div>
    <button class="btn btn-gold btn-block" onclick="doLogin('admin')" id="signin-btn">
      <svg class="icon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
      Sign in
    </button>
    <div class="quick-row">
      <button class="btn btn-ghost" onclick="doLogin('admin')">Demo as Admin</button>
      <button class="btn btn-ghost" onclick="doLogin('staff')">Demo as Staff</button>
    </div>
    <p class="login-foot">Prototype build — data resets on refresh</p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
<div id="sidebar-scrim" onclick="toggleSidebar(false)"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand-mark"><div class="diamond"></div><span>LEDGER</span></div>
    <div class="nav-group-label">Overview</div>
    <div class="nav-item active" data-page="dashboard" onclick="goPage('dashboard')"></div>
    <div class="nav-group-label">Inventory</div>
    <div class="nav-item" data-page="products" onclick="goPage('products')"></div>
    <div class="nav-item" data-page="categories" onclick="goPage('categories')"></div>
    <div class="nav-item" data-page="suppliers" onclick="goPage('suppliers')"></div>
    <div class="nav-group-label">Movement</div>
    <div class="nav-item" data-page="stockin" onclick="goPage('stockin')"></div>
    <div class="nav-item" data-page="stockout" onclick="goPage('stockout')"></div>
    <div class="nav-item" data-page="transactions" onclick="goPage('transactions')"></div>
    <div class="nav-group-label">Insights</div>
    <div class="nav-item" data-page="reports" onclick="goPage('reports')"></div>
    <div class="nav-item admin-only" data-page="users" onclick="goPage('users')"></div>
    <div class="nav-item" data-page="settings" onclick="goPage('settings')"></div>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="avatar" id="user-avatar">A</div>
        <div class="who"><div class="name" id="user-name">Admin User</div><div class="role" id="user-role">admin</div></div>
        <button class="btn-icon btn-ghost" style="border:none;" onclick="doLogout()" title="Sign out">
          <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main">
    <!-- topbar -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="toggleSidebar(true)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 12h18"/><path d="M3 6h18"/><path d="M3 18h18"/></svg>
        </button>
        <div>
          <div class="eyebrow" id="page-eyebrow">Overview</div>
          <h2 id="page-title">Dashboard</h2>
        </div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>

    <div id="pages"></div>
  </main>
</div>
</div>

<div id="modal-root"></div>
<div id="toast-wrap"></div>

<script src="js/app.js"></script>
</body>
</html>
